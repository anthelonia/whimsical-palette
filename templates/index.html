<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Whimsical Palette</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Maple+Mono:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #110A1A;
            color: #E2D6F5;
            font-family: 'Maple Mono', monospace;
            overflow: hidden;
        }

        .navbar {
            background: #1E122D;
            border-bottom: 3px solid #7E22CE;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        .nav-brand {
            font-size: 24px;
            font-weight: bold;
            color: #D926A9;
        }

        .add-btn {
            background: #D926A9;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .add-btn:hover {
            transform: scale(1.15) rotate(90deg);
        }

        .form-panel {
            display: none;
            flex-direction: row;
            gap: 15px;
            background: #1E122D;
            padding: 20px;
            border-bottom: 3px solid #7E22CE;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            justify-content: center;
            flex-shrink: 0;
            z-index: 99;
        }

        .form-panel.active {
            display: flex;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        input, button {
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #7E22CE;
            background: #110A1A;
            color: #E2D6F5;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }

        .save-btn {
            background: #D926A9;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .save-btn:hover {
            transform: scale(1.15);
        }

        input[type="color"] {
            padding: 0;
            width: 50px;
            cursor: pointer;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 10px; }

        .palette-container {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
        }

        .palette-container::-webkit-scrollbar {
            height: 12px;
        }
        
        .palette-container::-webkit-scrollbar-track {
            background: #110A1A;
        }
        
        .palette-container::-webkit-scrollbar-thumb {
            background: #7E22CE;
            border-radius: 10px;
        }

        .color-col {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background-color 0.5s ease;
            cursor: pointer;
        }

        .random-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(17, 10, 26, 0.25);
            border: 3px solid rgba(226, 214, 245, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .random-circle:hover {
            transform: scale(1.25) rotate(180deg);
            background: rgba(17, 10, 26, 0.6);
            border-color: #D926A9;
        }

        .info-pill {
            position: absolute;
            bottom: 60px;
            background: rgba(17, 10, 26, 0.85);
            padding: 20px 25px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #7E22CE;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 70%;
            pointer-events: none;
        }

        .color-col:hover .info-pill {
            transform: translateY(-15px);
        }

        .color-title {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 8px;
            color: #D926A9;
        }

        .color-values {
            font-size: 1em;
            margin-bottom: 8px;
            letter-spacing: 1px;
            color: #E2D6F5;
        }

        .color-comment {
            font-size: 0.8em;
            opacity: 0.7;
            line-height: 1.4;
            color: #E2D6F5;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: #D926A9;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">🔮 Whimsical Palette</div>
        <button class="add-btn" onclick="toggleForm()">+</button>
    </div>

    <div class="form-panel" id="formPanel">
        <input type="text" id="title" placeholder="Nazwa koloru" autocomplete="off">
        <input type="color" id="hex" value="#D926A9">
        <input type="text" id="comment" placeholder="Do czego służy?" autocomplete="off">
        <button class="save-btn" onclick="addColor()">Zapisz</button>
    </div>

    <div class="palette-container" id="palette"></div>
    <div class="toast" id="toast">Skopiowano do schowka! 🪄</div>

    <script>
        function toggleForm() {
            document.getElementById('formPanel').classList.toggle('active');
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function getRandomHex() {
            return '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0').toUpperCase();
        }

        let activeColorElement = null;

        async function loadColors() {
            const res = await fetch('/api/colors');
            const colors = await res.json();
            const container = document.getElementById('palette');
            container.innerHTML = '';
            
            colors.reverse().forEach(c => {
                const col = document.createElement('div');
                col.className = 'color-col';
                col.style.backgroundColor = c.hex;
                col.setAttribute('data-db-hex', c.hex); 
                
                col.onclick = () => {
                    activeColorElement = col; 
                    const currentHex = col.getAttribute('data-current-hex') || col.getAttribute('data-db-hex');
                    const currentRgb = hexToRgb(currentHex);
                    copyToClipboard(currentHex, currentRgb);
                };

                const circle = document.createElement('div');
                circle.className = 'random-circle';
                circle.innerHTML = '✨';
                
                circle.onclick = (e) => {
                    e.stopPropagation();
                    activeColorElement = col; 
                    randomizeElementColor(col);
                };
                
                const info = document.createElement('div');
                info.className = 'info-pill';
                
                const title = document.createElement('div');
                title.className = 'color-title';
                title.textContent = c.title;
                
                const vals = document.createElement('div');
                vals.className = 'color-values';
                vals.textContent = `${c.hex.toUpperCase()} • ${c.rgb}`;
                
                vals.oncontextmenu = async (e) => {
                    e.preventDefault(); 
                    e.stopPropagation();
                    
                    const newHexInput = prompt("Podaj nowy HEX (np. #FF00FF):", col.getAttribute('data-db-hex'));
                    
                    if (newHexInput && /^#[0-9A-F]{6}$/i.test(newHexInput.trim())) {
                        const validHex = newHexInput.trim().toUpperCase();
                        const validRgb = hexToRgb(validHex);
                        
                        await fetch('/api/colors/update', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                title: c.title,
                                new_hex: validHex,
                                new_rgb: validRgb
                            })
                        });
                        
                        loadColors(); 
                    } else if (newHexInput) {
                        alert("Błędny format HEX! Użyj formatu #RRGGBB.");
                    }
                };

                const comment = document.createElement('div');
                comment.className = 'color-comment';
                comment.textContent = c.comment;
                
                info.appendChild(title);
                info.appendChild(vals);
                info.appendChild(comment);
                
                col.appendChild(circle);
                col.appendChild(info);
                container.appendChild(col);
            });
        }

        function randomizeElementColor(element) {
            if(!element) return;
            const newHex = getRandomHex();
            const newRgb = hexToRgb(newHex);
            
            element.style.backgroundColor = newHex;
            element.setAttribute('data-current-hex', newHex);
            
            const valsDiv = element.querySelector('.color-values');
            valsDiv.textContent = `${newHex} • ${newRgb}`;
        }

        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space' && event.target.tagName !== 'INPUT') {
                event.preventDefault(); 
                if(activeColorElement) {
                    randomizeElementColor(activeColorElement);
                }
            }
        });

        async function addColor() {
            const title = document.getElementById('title').value;
            const hex = document.getElementById('hex').value;
            const comment = document.getElementById('comment').value;
            const rgb = hexToRgb(hex);
            
            if(!title) return;
            
            await fetch('/api/colors', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, hex, rgb, comment})
            });
            
            document.getElementById('title').value = '';
            document.getElementById('comment').value = '';
            toggleForm();
            loadColors();
        }

        function copyToClipboard(hex, rgb) {
            const textToCopy = `HEX: ${hex.toUpperCase()} | RGB: ${rgb}`;
            navigator.clipboard.writeText(textToCopy);
            
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        loadColors();
    </script>
</body>
</html>
